<!DOCTYPE html>
<div style="width:100%;height:600px;overflow:hidden;position:relative;background:#0a0a2e;font-family:var(--font-sans);">
<canvas id="gc" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>

<div id="title-screen" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;">
  <div style="font-size:12px;letter-spacing:3px;color:#f9a8d4;margin-bottom:8px;text-transform:uppercase;">A gift for you 💕</div>
  <div style="font-size:26px;font-weight:500;color:#fff;text-align:center;line-height:1.3;margin-bottom:6px;">100 Reasons<br>I Love You</div>
  <div style="width:60px;height:2px;background:linear-gradient(90deg,transparent,#f9a8d4,transparent);margin:12px auto;"></div>
  <div style="font-size:13px;color:#c4b5fd;margin-bottom:28px;">Shoot the meteors to reveal why ✨</div>
  <button onclick="startGame()" style="background:transparent;border:1.5px solid #f9a8d4;color:#f9a8d4;padding:12px 32px;border-radius:30px;font-size:15px;cursor:pointer;letter-spacing:1px;">Start ✈️</button>
</div>

<div id="end-screen" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;z-index:10;background:rgba(10,10,46,0.97);overflow-y:auto;">
  <div style="padding:28px 20px 40px;width:100%;box-sizing:border-box;text-align:center;">
    <div style="font-size:12px;letter-spacing:3px;color:#f9a8d4;margin-bottom:10px;text-transform:uppercase;">For Tithi 💕</div>
    <div style="font-size:19px;font-weight:500;color:#fff;line-height:1.5;margin-bottom:6px;">I love you so much Tithi.</div>
    <div style="font-size:15px;color:#c4b5fd;line-height:1.7;max-width:300px;margin:0 auto 20px;">You are the best thing that has ever happened to me. I'm going to miss you so much!</div>
    <div style="width:60px;height:1px;background:linear-gradient(90deg,transparent,#f9a8d4,transparent);margin:0 auto 20px;"></div>
    <div style="font-size:13px;color:#f9a8d4;margin-bottom:14px;letter-spacing:1px;">100 REASONS I LOVE YOU</div>
    <div id="reasons-list" style="text-align:left;max-width:320px;margin:0 auto;"></div>
    <button onclick="location.reload()" style="margin-top:28px;background:transparent;border:1.5px solid #f9a8d4;color:#f9a8d4;padding:10px 28px;border-radius:30px;font-size:14px;cursor:pointer;">Play Again 🌸</button>
  </div>
</div>

<div id="gameover-screen" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(10,10,46,0.92);padding:24px;text-align:center;">
  <div style="font-size:22px;font-weight:500;color:#fff;margin-bottom:8px;">Game Over 💜</div>
  <div style="font-size:14px;color:#c4b5fd;margin-bottom:24px;">You revealed <span id="final-score">0</span> reasons</div>
  <button onclick="location.reload()" style="background:transparent;border:1.5px solid #f9a8d4;color:#f9a8d4;padding:10px 28px;border-radius:30px;font-size:14px;cursor:pointer;">Try Again 🌸</button>
</div>

<div id="hud" style="display:none;position:absolute;top:12px;left:0;right:0;padding:0 16px;justify-content:space-between;align-items:center;z-index:5;">
  <div id="lives-display" style="color:#f9a8d4;font-size:13px;">❤️❤️❤️</div>
  <div style="color:#c4b5fd;font-size:12px;letter-spacing:1px;">REASONS: <span id="score-display">0</span>/99</div>
</div>

<div id="toast" style="display:none;position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(124,58,237,0.85);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;max-width:280px;text-align:center;z-index:6;pointer-events:none;line-height:1.4;"></div>

<script>
const reasons=["You care so much about people","You're so happy all the time","Your amazing smile — I keep staring at you!","You're so loving","You care so much about me","You are extremely pretty","You get super excited about little things :)","You are extremely smart","You are so organized","You are very disciplined","Your eyes — they are so stunning!","You are the cutest!","You are the prettiest girl I've ever seen","Your blindness without your glasses","Your 'I don't like it'","You understand me so well","You always stand by me","Your gifts are the most thoughtful","Your super loud laugh","You find the silliest things so funny","Your Rajdhani jokes","How you laugh at your own Rajdhani jokes every time","Your passion for the brain and psychology","Your desire to save all living creatures","How you hold me tightly when scared watching a film","You are the sweetest thing ever!","You cook so well!","Your hugs — I just want to lay in your arms forever","How much you care about my sleep","You care so much about mindfulness","You're so calm all the time","You're so understanding","I can have amazing thoughtful discussions with you","You love your family and friends so much","You don't give up","You push me to be a better person every day","You are so respectful of your body","You love to exercise!","You love to do things with me","You teach me so many things about food & health","You teach me how to cook","You care about what I put in my body","Your curly, greying hair","Your 'Harry Potter' glasses","Your chotu nose","Your beautiful lips","Your super tiny mouth","Your pretty skin that gets red so easily","Your dislike for mosquitos","The way you lightly cry when something upsets you","Your excitement about your dresses and clothes","Your love for your accessories","You always want to do activities with me","You're the person I trust most in this world","You're the person I feel most connected to","My bond with you","How you wanted to tell all your friends our story","You never let me look down on myself","You always uplift me","You give me confidence","You never let me talk bad about myself","The way you make me smile","Our phone calls","Your sweet messages filled with love","Your amazing artistic ability","How highly you always talk about me","You watch movies with me","You watch shows with me","You watch movies you don't even like because of me","Your patience","Your sacrifices — your sleep, time, and meals","Our runs together","Our cooking together","You trust me so much, and I'll always protect that","The way you look at me with your cute eyes","Your adorable sad face","Your adorable happy face","You always comfort me","The image of our life together","I love what we are building together","I love how we complement each other","How we complement each other despite being opposites","Your little pimples — I love them","Your tiny arms and huge biceps","Your honesty with me","How you can never lie when I ask 'Kasam Se?'","You're always there for me","Our late night conversations","How you remember everything I tell you","You listen to me so keenly","Your endless bak-bak — it's so cute","How much you love eating","Your 'aha' when tasting food you cooked","Your excitement about the future","You're the best person I know","You're the kindest person I know","You're the most beautiful soul I know","You're my best friend","You're my girlfriend"];

let canvas,ctx,W,H,plane,bullets,meteors,particles,stars;
let lives,score,frame,gameRunning,touchX=null,autoShootTimer=0;
let shuffled=[],currentIdx=0,toastTimeout=null;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(){
  document.getElementById('title-screen').style.display='none';
  document.getElementById('hud').style.display='flex';
  canvas=document.getElementById('gc');ctx=canvas.getContext('2d');
  resize();window.addEventListener('resize',resize);
  canvas.addEventListener('touchstart',onTouch,{passive:true});
  canvas.addEventListener('touchmove',onTouch,{passive:true});
  canvas.addEventListener('touchend',()=>touchX=null);
  canvas.addEventListener('mousemove',e=>{let r=canvas.getBoundingClientRect();touchX=e.clientX-r.left;});
  canvas.addEventListener('click',shoot);
  shuffled=shuffle(reasons);
  lives=3;score=0;frame=0;gameRunning=true;
  plane={x:W/2,y:H-70};bullets=[];meteors=[];particles=[];
  stars=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.5,t:Math.random()*Math.PI*2}));
  updateHUD();requestAnimationFrame(loop);
}

function resize(){
  let r=canvas.parentElement.getBoundingClientRect();
  W=canvas.width=r.width;H=canvas.height=r.height;
  if(plane)plane.y=H-70;
}

function onTouch(e){let r=canvas.getBoundingClientRect();touchX=e.touches[0].clientX-r.left;}
function shoot(){if(!gameRunning)return;bullets.push({x:plane.x,y:plane.y-20,dy:-11});}

function spawnMeteor(){
  let sz=55+Math.random()*30;
  meteors.push({x:Math.random()*(W-sz)+sz/2,y:-sz,r:sz/2,dy:0.25+Math.random()*0.15,rot:Math.random()*Math.PI*2,drot:(Math.random()-0.5)*0.02,idx:currentIdx});
  currentIdx=(currentIdx+1)%shuffled.length;
}

function spawnParticles(x,y,color){
  for(let i=0;i<14;i++){let a=Math.random()*Math.PI*2,sp=2+Math.random()*4;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:2+Math.random()*3});}
}

function showToast(text,num){
  let el=document.getElementById('toast');
  el.textContent=`#${num}: ${text}`;
  el.style.display='block';el.style.opacity='1';el.style.transition='';
  if(toastTimeout)clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>{
    el.style.transition='opacity 0.5s';el.style.opacity='0';
    setTimeout(()=>{el.style.display='none';el.style.transition='';},500);
  },2800);
}

function loop(){
  if(!gameRunning)return;
  frame++;
  ctx.clearRect(0,0,W,H);
  let grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0a2e');grad.addColorStop(0.5,'#1a1a4e');grad.addColorStop(1,'#2d1b4e');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.t+=0.02;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${0.4+Math.sin(s.t)*0.3})`;ctx.fill();});
  if(frame%120===0)spawnMeteor();
  autoShootTimer++;if(autoShootTimer>22){autoShootTimer=0;shoot();}
  if(touchX!==null)plane.x+=(touchX-plane.x)*0.15;
  plane.x=Math.max(30,Math.min(W-30,plane.x));
  bullets=bullets.filter(b=>{
    b.y+=b.dy;if(b.y<-20)return false;
    ctx.fillStyle='#f0abfc';ctx.shadowColor='#f0abfc';ctx.shadowBlur=8;
    ctx.beginPath();ctx.roundRect(b.x-1.5,b.y,3,14,2);ctx.fill();ctx.shadowBlur=0;
    return true;
  });
  meteors=meteors.filter(m=>{
    m.y+=m.dy;m.rot+=m.drot;
    if(m.y-m.r>H){
      lives--;updateHUD();spawnParticles(m.x,H-20,'#f87171');
      if(lives<=0){endGame(false);return false;}
      return false;
    }
    for(let i=0;i<bullets.length;i++){
      let b=bullets[i],dx=b.x-m.x,dy=b.y-m.y;
      if(Math.sqrt(dx*dx+dy*dy)<m.r){
        bullets.splice(i,1);spawnParticles(m.x,m.y,'#f9a8d4');
        score++;updateHUD();
        showToast(shuffled[m.idx],score);
        if(score>=99){endGame(true);return false;}
        return false;
      }
    }
    drawMeteor(m);return true;
  });
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.04;p.vy+=0.1;if(p.life<=0)return false;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color+Math.floor(p.life*255).toString(16).padStart(2,'0');ctx.fill();return true;
  });
  let x=plane.x,y=plane.y;
  ctx.save();ctx.shadowColor='#f9a8d4';ctx.shadowBlur=12;
  ctx.fillStyle='#f9a8d4';ctx.beginPath();ctx.moveTo(x,y-20);ctx.lineTo(x-14,y+10);ctx.lineTo(x,y+4);ctx.lineTo(x+14,y+10);ctx.closePath();ctx.fill();
  ctx.fillStyle='#c4b5fd';
  ctx.beginPath();ctx.moveTo(x-14,y+10);ctx.lineTo(x-26,y+6);ctx.lineTo(x-12,y+2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+14,y+10);ctx.lineTo(x+26,y+6);ctx.lineTo(x+12,y+2);ctx.closePath();ctx.fill();
  ctx.fillStyle='#7c3aed';ctx.beginPath();ctx.arc(x,y-8,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y-8,2.5,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
  for(let i=0;i<3;i++)particles.push({x:x+(Math.random()-0.5)*8,y:y+14,vx:(Math.random()-0.5)*0.4,vy:Math.random()*2+1,life:0.5,color:'#f472b6',r:2});
  requestAnimationFrame(loop);
}

function drawMeteor(m){
  ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.rot);
  ctx.fillStyle='#7c3aed';ctx.strokeStyle='#c4b5fd';ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let i=0;i<8;i++){let a=(i/8)*Math.PI*2,r=i%2===0?m.r:m.r*0.72;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
  ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  let reason=shuffled[m.idx]||'',maxW=m.r*1.5,words=reason.split(' '),lines=[],cur='';
  ctx.font='bold 9px sans-serif';
  words.forEach(w=>{let t=cur?cur+' '+w:w;ctx.measureText(t).width>maxW?(lines.push(cur),cur=w):(cur=t);});
  if(cur)lines.push(cur);
  let lh=11,ty=m.y-((lines.length-1)*lh/2);
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  lines.forEach((l,i)=>ctx.fillText(l,m.x,ty+i*lh));
}

function endGame(won){
  gameRunning=false;
  if(won){
    let list=document.getElementById('reasons-list');
    list.innerHTML='';
    reasons.forEach((r,i)=>{
      let row=document.createElement('div');
      row.style.cssText='display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid rgba(196,181,253,0.15);align-items:baseline;';
      row.innerHTML=`<span style="color:#f9a8d4;font-size:11px;min-width:22px;text-align:right;flex-shrink:0;">${i+1}.</span><span style="color:#e2d9f3;font-size:13px;line-height:1.5;">${r}</span>`;
      list.appendChild(row);
    });
    document.getElementById('end-screen').style.display='flex';
  } else {
    document.getElementById('final-score').textContent=score;
    document.getElementById('gameover-screen').style.display='flex';
  }
}

function updateHUD(){
  let h='';for(let i=0;i<3;i++)h+=i<lives?'❤️':'🖤';
  document.getElementById('lives-display').textContent=h;
  document.getElementById('score-display').textContent=score;
}
</script>
</div>
